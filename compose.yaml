services:
  inventoryservice:
    image: development/inventoryservice
    pull_policy: never
    build:
      context: InventoryService
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
    ports:
      - "5098:8080"
  
  lendingservice:
    image: development/lendingservice
    pull_policy: never
    build:
      context: LendingService
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
    ports:
      - "5136:8080"
  
  rabbitmq:
    image: rabbitmq:4-management
    ports:
      - "5672:5672"
      - "15672:15672"